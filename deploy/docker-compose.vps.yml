# Hostinger VPS (Docker Manager) için compose.
# Kullanım: Docker Manager > Create project > Compose'a bu dosyayı yapıştır,
# environment değerlerini gerçekleriyle doldur (asla bu dosyayı gerçek
# secret'larla commit'leme — bu kopya şablondur).
#
# SSL/domain'i sunucudaki mevcut nginx yönetir (tourismpartner.world yönlendirmesi
# de orada): nginx 80/443'te dinler ve tourismpartner.com'u 127.0.0.1:3000'e
# proxy'ler. Bu yüzden compose'da Caddy yok; app portu yalnızca localhost'a açılır.

services:
  app:
    image: ghcr.io/emrearslan8/tourism-partner:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      SUPABASE_SERVICE_ROLE_KEY: "DOLDUR"
      CRON_SECRET: "DOLDUR"
      RESEND_API_KEY: "DOLDUR"
      EMAIL_FROM: "DOLDUR"
      DEEPL_API_KEY: "DOLDUR"
      NEXT_PUBLIC_SUPABASE_URL: "DOLDUR"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "DOLDUR"
      NEXT_PUBLIC_SITE_URL: "https://srv1746085.hstgr.cloud"

# Otomatik güncelleme yok: yeni sürüm için sunucuda `docker compose pull app && docker compose up -d app`.
# (watchtower Docker daemon API uyumsuzluğu yüzünden kaldırıldı; sonsuz restart'ta güncelleme çekemiyordu.)
