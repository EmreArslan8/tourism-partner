name: Process email deliveries

# Vercel Hobby planı 5 dakikalık cron'a izin vermediği için
# email kuyruğunu buradan tetikliyoruz.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/process-email-deliveries"
